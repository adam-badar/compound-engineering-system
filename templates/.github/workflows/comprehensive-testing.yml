name: Comprehensive Testing

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff check
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Black format check
        run: poetry run black --check .

      - name: Mypy type check
        run: poetry run mypy .

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run unit tests
        run: poetry run pytest tests/unit -v --tb=short

  integration-prereqs:
    runs-on: ubuntu-latest
    needs: lint-and-format
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      run: ${{ steps.integration-prereqs.outputs.run }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate integration prerequisites
        id: integration-prereqs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ ! -d tests/integration ]]; then
            echo "No tests/integration directory found. Skipping integration tests."
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "DATABASE_URL secret is required when tests/integration exists."
            exit 1
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-format, integration-prereqs]
    if: needs.integration-prereqs.outputs.run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run integration tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: poetry run pytest tests/integration -v --tb=short
